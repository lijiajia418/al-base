name: Build and Push to Aliyun ACR

on:
  push:
    branches: [master]
  workflow_dispatch:  # 支持手动触发

env:
  IMAGE_NAME: al-base

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Generate image tags
        id: meta
        run: |
          REGISTRY=${{ secrets.ALIYUN_REGISTRY }}
          NAMESPACE=${{ secrets.ALIYUN_NAMESPACE }}
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "tag_latest=${REGISTRY}/${NAMESPACE}/${IMAGE_NAME}:latest" >> $GITHUB_OUTPUT
          echo "tag_sha=${REGISTRY}/${NAMESPACE}/${IMAGE_NAME}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "tag_ts=${REGISTRY}/${NAMESPACE}/${IMAGE_NAME}:${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tag_latest }}
            ${{ steps.meta.outputs.tag_sha }}
            ${{ steps.meta.outputs.tag_ts }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
